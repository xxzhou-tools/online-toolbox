<body>
    <div class="container">

            </header>

            <div class="tools-grid">
                <div class="tool-card" onclick="openTool('password')">

                    <h3>密码生成器</h3>

                    <div class="tool-icon">📄</div>

                    <p>格式化、压缩、高亮显示 JSON 数据</p>
                </div>

                    <div class="tool-icon">🔄</div>

                    <div class="tool-icon">📊</div>

                    <div class="tool-icon">⏰</div>

        </div>

        <!-- 工具界面 -->
        <div id="tool-container" class="tool-container">
            <button class="back-btn" onclick="backToHome()">← 返回工具列表</button>

    <script>
        function openTool(toolName) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('tool-container').classList.add('active');
            
            const toolContent = document.getElementById('tool-content');
            toolContent.innerHTML = getToolHTML(toolName);
        }

        function backToHome() {
            document.getElementById('home').style.display = 'block';
            document.getElementById('tool-container').classList.remove('active');
        }

        function getToolHTML(toolName) {
            const tools = {
                password: {
                    title: '🔐 密码生成器',
                    html: `
                        <div class="input-group">
                            <label>密码长度: <span id="lengthValue">16</span></label>
                            <input type="range" id="length" min="8" max="64" value="16" oninput="document.getElementById('lengthValue').textContent = this.value">
                        </div>
                        <div class="input-group">
                            <label>
                                <input type="checkbox" id="uppercase" checked> 包含大写字母
                            </label>
                        </div>
                        <div class="input-group">
                            <label>
                                <input type="checkbox" id="lowercase" checked> 包含小写字母
                            </label>
                        </div>
                        <div class="input-group">
                            <label>
                                <input type="checkbox" id="numbers" checked> 包含数字
                            </label>
                        </div>
                        <div class="input-group">
                            <label>
                                <input type="checkbox" id="symbols" checked> 包含特殊字符
                            </label>
                        </div>
                        <button class="action-btn" onclick="generatePassword()">生成密码</button>
                        <div id="result" class="result-box">
                            <h4>生成的密码：</h4>
                            <div class="result-content" id="passwordResult"></div>
                        </div>
                    `
                },
                json: {
                    title: '📄 JSON 格式化',
                    html: `
                        <div class="input-group">
                            <label>输入 JSON 数据：</label>
                            <textarea id="jsonInput" placeholder='{"name": "test", "value": 123}'></textarea>
                        </div>
                        <div>
                            <button class="action-btn" onclick="formatJSON()">格式化</button>
                            <button class="action-btn" onclick="compressJSON()">压缩</button>
                        </div>
                        <div id="result" class="result-box">
                            <h4>结果：</h4>
                            <div class="result-content" id="jsonResult"></div>
                        </div>
                    `
                },
                base64: {
                    title: '🔄 Base64 编解码',
                    html: `
                        <div class="input-group">
                            <label>输入内容：</label>
                            <textarea id="base64Input" placeholder="输入要编码或解码的文本"></textarea>
                        </div>
                        <div>
                            <button class="action-btn" onclick="encodeBase64()">编码</button>
                            <button class="action-btn" onclick="decodeBase64()">解码</button>
                        </div>
                        <div id="result" class="result-box">
                            <h4>结果：</h4>
                            <div class="result-content" id="base64Result"></div>
                        </div>
                    `
                },
                wordcount: {
                    title: '📊 字数统计',
                    html: `
                        <div class="input-group">
                            <label>输入文本：</label>
                            <textarea id="textInput" placeholder="输入要统计的文本" oninput="countWords()"></textarea>
                        </div>
                        <div id="result" class="result-box active">
                            <h4>统计结果：</h4>
                            <div class="result-content" id="wordResult">请输入文本...</div>
                        </div>
                    `
                },
                color: {
                    title: '🎨 颜色转换器',
                    html: `
                        <div class="input-group">
                            <label>HEX 颜色：</label>
                            <input type="text" id="hexColor" placeholder="#FF5733" maxlength="7" oninput="convertColor()">
                        </div>
                        <div class="input-group">
                            <label>RGB 颜色：</label>
                            <input type="text" id="rgbColor" placeholder="255, 87, 51" oninput="convertFromRgb()">
                        </div>
                        <div id="result" class="result-box active">
                            <h4>转换结果：</h4>
                            <div class="result-content" id="colorResult">输入颜色进行转换</div>
                            <div id="colorPreview" style="width: 100px; height: 100px; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd;"></div>
                        </div>
                    `
                },
                timestamp: {
                    title: '⏰ 时间戳转换',
                    html: `
                        <div class="input-group">
                            <label>当前时间戳：</label>
                            <input type="text" id="currentTimestamp" readonly value="">
                        </div>
                        <div class="input-group">
                            <label>时间戳转日期：</label>
                            <input type="text" id="timestampInput" placeholder="1640995200">
                        </div>
                        <button class="action-btn" onclick="timestampToDate()">转换</button>
                        <div class="input-group" style="margin-top: 20px;">
                            <label>日期转时间戳：</label>
                            <input type="datetime-local" id="dateInput">
                        </div>
                        <button class="action-btn" onclick="dateToTimestamp()">转换</button>
                        <div id="result" class="result-box">
                            <h4>结果：</h4>
                            <div class="result-content" id="timestampResult"></div>
                        </div>
                    `
                }
            };

            const tool = tools[toolName];
            if (tool) {
                document.getElementById('currentTimestamp') && updateTimestamp();
                return `
                    <div class="tool-header">
                        <h2>${tool.title}</h2>
                    </div>
                    ${tool.html}
                `;
            }
            return '<p>工具加载失败</p>';
        }

        // 密码生成器
        function generatePassword() {
            const length = parseInt(document.getElementById('length').value);
            const useUppercase = document.getElementById('uppercase').checked;
            const useLowercase = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;

            let chars = '';
            if (useUppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (useLowercase) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (useNumbers) chars += '0123456789';
            if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (chars === '') {
                alert('请至少选择一种字符类型');
                return;
            }

            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            document.getElementById('result').classList.add('active');
            document.getElementById('passwordResult').textContent = password;
        }

        // JSON 格式化
        function formatJSON() {
            try {
                const input = document.getElementById('jsonInput').value;
                const json = JSON.parse(input);
                const formatted = JSON.stringify(json, null, 2);
                document.getElementById('result').classList.add('active');
                document.getElementById('jsonResult').textContent = formatted;
            } catch (e) {
                document.getElementById('result').classList.add('active');
                document.getElementById('jsonResult').textContent = 'JSON 格式错误: ' + e.message;
            }
        }

        function compressJSON() {
            try {
                const input = document.getElementById('jsonInput').value;
                const json = JSON.parse(input);
                const compressed = JSON.stringify(json);
                document.getElementById('result').classList.add('active');
                document.getElementById('jsonResult').textContent = compressed;
            } catch (e) {
                document.getElementById('result').classList.add('active');
                document.getElementById('jsonResult').textContent = 'JSON 格式错误: ' + e.message;
            }
        }

        // Base64 编解码
        function encodeBase64() {
            const input = document.getElementById('base64Input').value;
            try {
                const encoded = btoa(unescape(encodeURIComponent(input)));
                document.getElementById('result').classList.add('active');
                document.getElementById('base64Result').textContent = encoded;
            } catch (e) {
                document.getElementById('result').classList.add('active');
                document.getElementById('base64Result').textContent = '编码失败';
            }
        }

        function decodeBase64() {
            const input = document.getElementById('base64Input').value;
            try {
                const decoded = decodeURIComponent(escape(atob(input)));
                document.getElementById('result').classList.add('active');
                document.getElementById('base64Result').textContent = decoded;
            } catch (e) {
                document.getElementById('result').classList.add('active');
                document.getElementById('base64Result').textContent = '解码失败：请输入有效的 Base64 字符串';
            }
        }

        // 字数统计
        function countWords() {
            const text = document.getElementById('textInput').value;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            const chars = text.length;
            const charsNoSpaces = text.replace(/\s/g, '').length;
            const paragraphs = text.trim() === '' ? 0 : text.split(/\n\s*\n/).length;

            document.getElementById('wordResult').innerHTML = `
                字数：${words}<br>
                字符数：${chars}<br>
                字符数（不含空格）：${charsNoSpaces}<br>
                段落数：${paragraphs}
            `;
        }

        // 颜色转换
        function convertColor() {
            const hex = document.getElementById('hexColor').value;
            if (/^#[0-9A-F]{6}$/i.test(hex)) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                
                document.getElementById('rgbColor').value = `${r}, ${g}, ${b}`;
                document.getElementById('colorResult').textContent = `HEX: ${hex}\nRGB: ${r}, ${g}, ${b}`;
                document.getElementById('colorPreview').style.backgroundColor = hex;
            }
        }

        function convertFromRgb() {
            const rgb = document.getElementById('rgbColor').value;
            const match = rgb.match(/^\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*$/);
            
            if (match) {
                const r = parseInt(match[1]);
                const g = parseInt(match[2]);
                const b = parseInt(match[3]);
                
                if (r >= 0 && r <= 255 && g >= 0 && g <= 255 && b >= 0 && b <= 255) {
                    const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
                    document.getElementById('hexColor').value = hex;
                    document.getElementById('colorResult').textContent = `HEX: ${hex}\nRGB: ${r}, ${g}, ${b}`;
                    document.getElementById('colorPreview').style.backgroundColor = hex;
                }
            }
        }

        // 时间戳转换
        function updateTimestamp() {
            document.getElementById('currentTimestamp').value = Math.floor(Date.now() / 1000);
        }

        function timestampToDate() {
            const timestamp = parseInt(document.getElementById('timestampInput').value);
            if (!isNaN(timestamp)) {
                const date = new Date(timestamp * 1000);
                document.getElementById('result').classList.add('active');
                document.getElementById('timestampResult').textContent = date.toLocaleString('zh-CN');
            }
        }

        function dateToTimestamp() {
            const dateInput = document.getElementById('dateInput').value;
            if (dateInput) {
                const date = new Date(dateInput);
                const timestamp = Math.floor(date.getTime() / 1000);
                document.getElementById('result').classList.add('active');
                document.getElementById('timestampResult').textContent = timestamp;
            }
        }

        // 初始化
        updateTimestamp();
    </script>
